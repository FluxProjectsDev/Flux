name: Host tests

# Runs the Flux host-side test suite (native policy/telemetry/execution logic,
# compiled with a host toolchain) plus static checks. This is the automated home
# for the tests under jni/tests/. It needs NO secrets: no signing key, no token.
#
# It is intentionally separate from build.yml (the NDK/module packaging build):
# host tests exercise the safety logic and run in seconds without the NDK, so they
# give fast PR feedback and can run sanitizers a device build cannot.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'jni/**'
      - '.github/workflows/host-tests.yml'
  workflow_dispatch:

# Least privilege: these jobs only read the repository.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Native host tests (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: plain
            sanitize: '0'
          - mode: asan-ubsan
            sanitize: '1'
    steps:
      # TODO: pin actions to full commit SHAs via Dependabot (repo convention: tags for now).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build and run host tests
        env:
          SANITIZE: ${{ matrix.sanitize }}
        run: bash jni/tests/run_tests.sh

  static-checks:
    name: Static checks (shell + workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck the test runner
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './jni/tests'

      # The build/link/package proof scripts gate what ships, so they are held to the same
      # standard as the code they check: a quoting bug in a verifier is a verifier that passes
      # when it should fail. Scoped to .github/scripts — scripts/ carries pre-existing findings
      # in the device runtime scripts, which are a separate cleanup and not this phase's work.
      - name: ShellCheck the CI scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './.github/scripts'

      # The module's own shell now runs on every device that installs Flux, as root, and it was
      # not covered by either scandir above. Every file carries a `#!/system/bin/sh` shebang, so
      # ShellCheck holds them to POSIX sh without needing a flag here — which matters because
      # Magisk installs run under busybox ash, where `local`, `==` and `$(<file)` are undefined.
      # `$(<file)` had in fact been silently expanding to nothing in the SoC detection chain.
      - name: ShellCheck the module scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './module'
          severity: warning

      - name: actionlint
        uses: raven-actions/actionlint@v2

      # The runtime integrity classifier (module/integrity_runtime.sh) decides, at each boot,
      # whether Flux may write. This exercises it against a synthetic module tree — one case per
      # distinguishable failure (mismatch, missing, symlink, wrongtype, writable, denied,
      # generation, nomanifest) — proving it reports the right reason and returns the safe-no-write
      # signal on any critical failure. Pure host shell; needs no NDK and no device.
      - name: Runtime integrity classifier tests
        run: bash .github/scripts/verify-runtime-integrity.sh
