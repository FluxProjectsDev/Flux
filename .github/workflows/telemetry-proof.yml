name: Telemetry proof

# Final build/link/package proof for the Flux V2 telemetry runtime (Stage 1, Increment 3).
#
# Host tests prove the telemetry logic behaves; this workflow proves the *shipped artifact* is
# what we claim it is. Those are different questions, and only the second one can catch a
# resurrected translation unit, a stale object, an artifact swapped under a matching filename,
# or a build that quietly stopped linking a component in.
#
# It is deliberately separate from build.yml:
#
#   - build.yml owns publishing. It carries `contents: write` and a dispatch-gated release
#     step. This workflow proves things, so it stays read-only and has no release path at all
#     — there is nothing here to mis-trigger.
#   - It needs NO secrets: no signing key, no token, no Telegram credentials.
#
# It repeats build.yml's ndk-build rather than consuming its artifact: cross-workflow artifact
# download needs a run id that a pull_request event cannot resolve cleanly, and an independent
# build is stronger evidence anyway — the proof never depends on another workflow's output.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'jni/**'
      - 'module/**'
      - 'scripts/**'
      - 'webui/**'
      - 'prebuilt/**'
      - 'dependencies/**'
      - '.github/scripts/**'
      - '.github/workflows/telemetry-proof.yml'
  workflow_dispatch:

# Least privilege: this workflow only ever reads the repository. It cannot publish a release,
# move a tag, or write an artifact to the repo even if something in it went wrong.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  telemetry-proof:
    name: Link, symbol and package proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # TODO: pin actions to full commit SHAs via Dependabot (repo convention: tags for now).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # compile_zip.sh derives versionCode from `git rev-list --count HEAD`; a shallow
          # checkout would silently stamp the wrong number.
          fetch-depth: 0
          submodules: true

      - name: NDK Setup
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Bun Setup
        uses: oven-sh/setup-bun@v2

      # Integrity: the bundled APK is the pinned bytes.
      - name: Verify SynthesisCore artifact integrity
        run: bash scripts/verify-synthesiscore.sh

      # Provenance: those bytes really are schema v2, proven from the artifact's own metadata
      # rather than from the lock's claims or the file's name.
      - name: Prove SynthesisCore schema-v2 compatibility
        run: bash .github/scripts/verify-schema-provenance.sh

      # The Category A / Category C boundary is a licensing position, not a style rule: if the
      # device tables ever grow control flow, the engine's independence claim goes with them.
      # Checked before the build, because it needs no build to be true.
      - name: Prove the Category A / Category C boundary
        run: bash .github/scripts/verify-provenance-boundary.sh

      # The banner and icons are generated, so the committed rasters must be the ones their
      # generator produces — otherwise an edit to a generator ships a package whose artwork no
      # longer matches its own source and nothing says so. Runs before the build, because like
      # the provenance check above it needs no build to be true.
      #
      # Installed from apt rather than pip: Ubuntu images are PEP 668 externally-managed, so a
      # bare `pip install` fails. fonts-dejavu-core is not incidental — the generator refuses to
      # run without it rather than silently substituting whatever font it finds, which is what
      # keeps the output byte-reproducible across machines.
      - name: Install asset generator dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-pil fonts-dejavu-core

      # The icons are generated, so they are proven against their generator. The banner is not:
      # it is a conversion of a maintainer-approved artwork whose source is supplied out of band
      # and stays untracked, so there is nothing here to regenerate it from. It is proven against
      # its decoded pixel identity instead. See scripts/verify-branding.py.
      - name: Prove branding assets
        run: |
          python3 scripts/verify-branding.py
          python3 scripts/render-icons.py --check

      - name: Build Flux Daemon
        run: ndk-build -j"$(nproc --all)"

      # The core of this workflow: what is actually linked into fluxd.
      - name: Prove V2 telemetry link and symbols
        run: bash .github/scripts/verify-native-telemetry.sh

      # The cutover proof: the V2 execution engine is what writes, and the legacy shell applier
      # cannot be invoked. Checks the built binary's symbols, imports and strings — a source
      # search cannot tell a live call from a mention in a comment.
      - name: Prove V2 live execution and legacy deactivation (arm64-v8a)
        run: bash .github/scripts/verify-live-execution.sh arm64-v8a

      - name: Prove V2 live execution and legacy deactivation (armeabi-v7a)
        run: bash .github/scripts/verify-live-execution.sh armeabi-v7a

      # Release hardening of the shipped binary: minimal exported surface (the export map
      # took effect), exploit mitigations (non-exec stack, RELRO, BIND_NOW, PIE), no
      # developer paths, and the required entry point still present. Runs on the same
      # build output as the link proof above.
      - name: Prove native release hardening (both ABIs)
        run: bash .github/scripts/verify-native-hardening.sh

      # Build the WebUI so the package under validation is the package that ships, not a
      # stripped-down approximation of it.
      - name: Build WebUI
        working-directory: webui
        run: |
          bun install
          bun run build
          cp -r ./dist/* ../module/webroot

      # The produced build directory carries only presentation assets: no source maps, no
      # development/test files, no remote code, nothing secret-shaped. Proven on webui/dist — the
      # bytes just built — before they are packaged, and a deterministic asset inventory is emitted.
      - name: Prove WebUI production build
        run: bash .github/scripts/verify-webui-inventory.sh webui/dist

      - name: Compile Flashable Zip
        id: compileZip
        run: bash .github/scripts/compile_zip.sh

      - name: Validate flashable package
        id: validatePackage
        env:
          ZIP: ${{ steps.compileZip.outputs.zipName }}
        run: bash .github/scripts/verify-package.sh "$ZIP"

      - name: Prove Stage 2 release readiness (inventory, module.prop, secrets)
        id: releaseReadiness
        env:
          ZIP: ${{ steps.compileZip.outputs.zipName }}
          INVENTORY_OUT: package-inventory.tsv
        run: bash .github/scripts/verify-release-readiness.sh "$ZIP"

      - name: Prove module lifecycle (install / upgrade / uninstall)
        id: lifecycle
        run: bash .github/scripts/verify-lifecycle.sh

      # Executes the real customize.sh against a synthetic package under a fake manager
      # environment. This is the only step that observes installer *behaviour* rather than its
      # source: that a corrupted payload aborts before printing success, that APatch is not
      # misreported as KernelSU, that a warning downgrades the summary rather than being lost.
      - name: Prove installer behaviour (managers, upgrade, failure modes, action)
        id: installer
        run: bash .github/scripts/verify-installer.sh

      # The aggregate. It does not check that other jobs *exist* — it re-asserts, in one place,
      # the specific guarantees whose individual steps must all have run in *this* job to reach
      # here, and it writes the summary a reviewer reads to decide the PR is ready. Because it is
      # the last step of a job whose earlier steps fail the run on any violation, it cannot be
      # reached while any guarantee is unproven: there is no path to this step that skips them.
      - name: Stage 2 aggregate proof
        run: |
          bash .github/scripts/verify-stage2-aggregate.sh
        env:
          INVENTORY: package-inventory.tsv

      # Kept for inspection when a proof fails. This is an Actions artifact for humans, not a
      # release: nothing here uploads to a tag or a release.
      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-proof-${{ github.run_id }}
          path: |
            obj/local/*/fluxd
            libs/*/fluxd
            package-inventory.tsv
            native-hardening-*.exports
            webui-inventory.tsv
          retention-days: 7
          if-no-files-found: warn
